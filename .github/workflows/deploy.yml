name: Construir y publicar EVOLUCIÓN

# Se ejecuta solo cada vez que cambia algo en el repositorio (por ejemplo,
# cuando llega un boletin diario de la subida automática) y tambien a mano
# desde la pestaña Actions. Reconstruye la web y la publica en GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  construir:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Importar boletines y construir el sitio
        run: |
          python scripts/importar_boletin.py
          python scripts/generate_site.py

      - name: Preparar el sitio para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  publicar:
    needs: construir
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.despliegue.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: despliegue
        uses: actions/deploy-pages@v4
